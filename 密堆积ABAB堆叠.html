<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3.5 ABAB 密堆积层序 (HCP) - 无隔板</title>
    <style>
        :root {
            --bg: #f5e6c8;
            --text: #3a3028;
            --shadow: 0 4px 16px rgba(0,0,0,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas { display: block; }

        #info-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
            background: rgba(255,240,210,0.92); backdrop-filter: blur(8px); border-radius: 30px;
            padding: 10px 24px; box-shadow: var(--shadow); display: flex; align-items: center;
            gap: 16px; font-size: 15px; color: var(--text); pointer-events: auto;
            border: 1px solid rgba(180,150,100,0.3);
        }
        #info-panel .title { font-weight: 700; font-size: 17px; letter-spacing: 0.5px; color: #2a1f10; }
        #info-panel .divider { width: 1px; height: 20px; background: rgba(180,150,100,0.4); border-radius: 1px; }
        #info-panel .param { display: flex; align-items: center; gap: 6px; }
        #info-panel .param .label { font-size: 11px; color: #8a7a60; text-transform: uppercase; letter-spacing: 1px; }
        #info-panel .param .value { font-weight: 600; color: #5a4a30; }

        #legend {
            position: fixed; top: 130px; right: 20px; z-index: 10;
            background: rgba(255,240,210,0.9); backdrop-filter: blur(8px); border-radius: 12px;
            padding: 14px 16px; box-shadow: var(--shadow); display: flex; flex-direction: column;
            gap: 8px; font-size: 13px; pointer-events: auto;
            border: 1px solid rgba(180,150,100,0.3);
        }
        #legend .item { display: flex; align-items: center; gap: 8px; color: #5a4a30; }
        #legend .dot {
            width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), inset 2px 2px 4px rgba(255,255,255,0.5);
        }

        #bottom-info {
            position: fixed;
            bottom: 115px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255,240,210,0.85);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 8px 20px;
            font-size: 13px;
            color: #5a4a30;
            font-weight: 500;
            box-shadow: var(--shadow);
            border: 1px solid rgba(180,150,100,0.3);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #bottom-info span { white-space: nowrap; }

        #control-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10;
            background: rgba(255,240,210,0.92); backdrop-filter: blur(8px); border-radius: 40px;
            padding: 12px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); display: flex;
            align-items: center; gap: 10px; pointer-events: auto;
            border: 1px solid rgba(180,150,100,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        #control-bar button {
            padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer;
            font-size: 14px; font-weight: 600; letter-spacing: 0.5px; transition: all 0.25s;
            background: rgba(180,150,120,0.2); color: #5a4a30; white-space: nowrap; font-family: inherit;
        }
        #control-bar button:hover { background: rgba(180,150,120,0.4); color: #2a1f10; }
        #control-bar button.active { background: #3a3028; color: #f5e6c8; }

        #hint {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); z-index: 10;
            font-size: 12px; color: rgba(100,80,50,0.5); pointer-events: none;
        }

        @media (max-width: 768px) {
            #info-panel { font-size: 12px; padding: 8px 14px; gap: 8px; top: 10px; }
            #info-panel .title { font-size: 14px; }
            #legend { top: 100px; right: 8px; padding: 8px 10px; font-size: 11px; gap: 4px; }
            #bottom-info { bottom: 105px; font-size: 11px; padding: 6px 14px; gap: 10px; }
            #control-bar { bottom: 16px; padding: 8px 12px; gap: 6px; }
            #control-bar button { padding: 7px 12px; font-size: 12px; }
            #hint { bottom: 75px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div id="info-panel">
        <span class="title">🔴🟢🔴 ABAB 层序 (HCP)</span>
        <span class="divider"></span>
        <span class="param"><span class="label">层间距</span><span class="value">0.816</span></span>
        <span class="param"><span class="label">c/a</span><span class="value">≈1.633</span></span>
    </div>

    <div id="legend">
        <div class="item"><span class="dot" style="background:#B22222;"></span> A层 (z=0)</div>
        <div class="item"><span class="dot" style="background:#1E8449;"></span> B层 (z=0.816)</div>
        <div class="item"><span class="dot" style="background:#C0392B;"></span> A′层 (z=1.632)</div>
        <div class="item"><span class="dot" style="background:transparent; border:2px dashed #ffaa00;"></span> 三角形间隙</div>
    </div>

    <div id="bottom-info">
        <span>🔴 A层 z=0</span>
        <span>🟢 B层 z=0.816</span>
        <span>🔴 A′层 z=1.632</span>
        <span>📐 A′与A投影重合</span>
    </div>

    <div id="control-bar">
        <button id="btn-A" class="active">A层</button>
        <button id="btn-AB">A+B层</button>
        <button id="btn-all">A+B+A′层</button>
        <span style="width:2px; height:24px; background:rgba(180,150,100,0.4); border-radius:1px;"></span>
        <button id="top-view-btn">俯视</button>
        <button id="side-view-btn">侧视</button>
        <button id="auto-rotate-btn" class="active">⟳ 自动旋转</button>
        <button id="reset-btn">重置</button>
    </div>
    <div id="hint">🖱 拖拽旋转 | 滚轮缩放 | 右键平移</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ---------- 常量 ----------
        const R = 0.22;
        const ATOM_DIST = 2 * R;
        const LAYER_GAP = Math.sqrt(2 / 3) * ATOM_DIST;
        const C_VAL = LAYER_GAP * 2;

        // A层原子坐标
        const hexAngles = [0, 60, 120, 180, 240, 300].map(d => d * Math.PI / 180);
        const surroundingAtoms = hexAngles.map(a => new THREE.Vector3(ATOM_DIST * Math.cos(a), ATOM_DIST * Math.sin(a), 0));
        const centerAtom = new THREE.Vector3(0, 0, 0);
        const allALayerPositions = [centerAtom, ...surroundingAtoms];

        // 三角形间隙
        const gapPositions = [];
        for (let i = 0; i < 6; i++) {
            const p1 = centerAtom;
            const p2 = surroundingAtoms[i];
            const p3 = surroundingAtoms[(i + 1) % 6];
            const gap = new THREE.Vector3(
                (p1.x + p2.x + p3.x) / 3,
                (p1.y + p2.y + p3.y) / 3,
                0
            );
            gapPositions.push(gap);
        }
        const bLayerGapIndices = [1, 3, 5];
        const bLayerPositions = bLayerGapIndices.map(i => gapPositions[i].clone());

        // ---------- 场景 ----------
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#f5e6c8');
        scene.fog = new THREE.Fog('#f5e6c8', 2.5, 12);

        const camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 0.2, 15);
        camera.position.set(1.8, 1.5, 2.5);
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.minDistance = 1.0;
        controls.maxDistance = 6;
        controls.maxPolarAngle = Math.PI * 0.78;
        controls.update();

        scene.add(new THREE.AmbientLight('#fff8ee', 2.5));
        scene.add(new THREE.HemisphereLight('#ffffff', '#c8b898', 1.2));
        const sun = new THREE.DirectionalLight('#ffffff', 5);
        sun.position.set(3, 5, 3);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 0.3;
        sun.shadow.camera.far = 15;
        sun.shadow.camera.left = -4;
        sun.shadow.camera.right = 4;
        sun.shadow.camera.top = 4;
        sun.shadow.camera.bottom = -4;
        sun.shadow.bias = -0.0001;
        scene.add(sun);

        // ---------- 虚线间隙标记 ----------
        function addDashedRing(center, radius = 0.06, color = '#ffaa00', opacity = 0.55) {
            const segments = 28;
            const points = [];
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                points.push(new THREE.Vector3(
                    center.x + radius * Math.cos(angle),
                    center.y + radius * Math.sin(angle),
                    center.z + 0.01
                ));
            }
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineDashedMaterial({
                color, dashSize: 0.05, gapSize: 0.035,
                transparent: true, opacity, depthTest: true
            });
            const ring = new THREE.Line(geom, mat);
            ring.computeLineDistances();
            ring.renderOrder = 3;
            scene.add(ring);
        }
        bLayerGapIndices.forEach(i => addDashedRing(gapPositions[i], 0.06, '#ffaa00', 0.55));

        // ---------- 原子层 ----------
        const geomSphere = new THREE.SphereGeometry(R, 40, 40);
        const matA = new THREE.MeshStandardMaterial({ color: '#B22222', roughness: 0.25, metalness: 0.12 });
        const matB = new THREE.MeshStandardMaterial({ color: '#1E8449', roughness: 0.25, metalness: 0.12 });
        const matAprime = new THREE.MeshStandardMaterial({ color: '#C0392B', roughness: 0.25, metalness: 0.12 });

        function addAtom(group, pos, material) {
            const atom = new THREE.Mesh(geomSphere, material);
            atom.position.copy(pos);
            atom.castShadow = true;
            atom.receiveShadow = true;
            group.add(atom);
        }

        const groupA = new THREE.Group();
        allALayerPositions.forEach(p => addAtom(groupA, p, matA));
        scene.add(groupA);

        const groupB = new THREE.Group();
        bLayerPositions.forEach(p => {
            const pos = p.clone();
            pos.z = LAYER_GAP;
            addAtom(groupB, pos, matB);
        });
        scene.add(groupB);

        const groupAprime = new THREE.Group();
        allALayerPositions.forEach(p => {
            const pos = p.clone();
            pos.z = C_VAL;
            addAtom(groupAprime, pos, matAprime);
        });
        scene.add(groupAprime);

        // ---------- 递进式分层控制 ----------
        let currentMode = 'A';
        function updateVisibility() {
            groupA.visible = (currentMode === 'A' || currentMode === 'AB' || currentMode === 'all');
            groupB.visible = (currentMode === 'AB' || currentMode === 'all');
            groupAprime.visible = (currentMode === 'all');
        }
        updateVisibility();

        function setActiveButton(id) {
            ['btn-A', 'btn-AB', 'btn-all'].forEach(x => document.getElementById(x)?.classList.remove('active'));
            document.getElementById(id)?.classList.add('active');
        }

        document.getElementById('btn-A').addEventListener('click', () => {
            currentMode = 'A'; updateVisibility(); setActiveButton('btn-A');
        });
        document.getElementById('btn-AB').addEventListener('click', () => {
            currentMode = 'AB'; updateVisibility(); setActiveButton('btn-AB');
        });
        document.getElementById('btn-all').addEventListener('click', () => {
            currentMode = 'all'; updateVisibility(); setActiveButton('btn-all');
        });

        // ---------- 视角控制 ----------
        const defaultPos = camera.position.clone();
        const defaultTarget = controls.target.clone();

        function animateCamera(pos, target) {
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            const duration = 600;
            const startTime = Date.now();
            function step() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1.0);
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                camera.position.lerpVectors(startPos, pos, ease);
                controls.target.lerpVectors(startTarget, target, ease);
                controls.update();
                if (t < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        document.getElementById('top-view-btn').addEventListener('click', () => {
            animateCamera(new THREE.Vector3(0, 0.1, 2.8), new THREE.Vector3(0, 0.5, 0));
        });
        document.getElementById('side-view-btn').addEventListener('click', () => {
            animateCamera(new THREE.Vector3(2.8, 0, 0.5), new THREE.Vector3(0, 0.5, 0));
        });

        const autoBtn = document.getElementById('auto-rotate-btn');
        autoBtn.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            autoBtn.classList.toggle('active', controls.autoRotate);
            autoBtn.innerHTML = controls.autoRotate ? '⟳ 自动旋转' : '⟲ 暂停旋转';
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            animateCamera(defaultPos, defaultTarget);
            controls.autoRotate = true;
            autoBtn.classList.add('active');
            autoBtn.innerHTML = '⟳ 自动旋转';
            currentMode = 'A';
            updateVisibility();
            setActiveButton('btn-A');
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
